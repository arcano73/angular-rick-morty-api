<h1 class="title">Personajes de Rick and Morty</h1>

<p *ngIf="loading">Cargando personajes...</p>
<p *ngIf="error">{{ error }}</p>

<div *ngIf="!loading && !error">
  <p>Página actual: {{ currentPage }}</p>

  <p *ngIf="characters.length === 0">No se encontraron personajes.</p>

  <div class="character-container" *ngIf="characters.length > 0">
    <div
      class="character-card"
      *ngFor="let character of characters"
      [routerLink]="['/character', character.id]"
    >
      <img
        [src]="character.image"
        [alt]="character.name"
        class="character-image"
      />

      <div class="character-info">
        <h2>{{ character.name }}</h2>
        <p><strong>Status:</strong> {{ character.status }}</p>
        <p><strong>Species:</strong> {{ character.species }}</p>
        <p><strong>Gender:</strong> {{ character.gender }}</p>
      </div>
    </div>
  </div>
</div>

<div class="pagination" *ngIf="!loading && !error">
  <button (click)="previousPage()" [disabled]="currentPage === 1">
    Anterior
  </button>
  <button (click)="nextPage()">Siguiente</button>
</div>
